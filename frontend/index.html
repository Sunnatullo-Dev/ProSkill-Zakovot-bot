<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <!--
      interactive-widget=resizes-content: mobil klaviatura ochilganda
      viewport (vh/dvh birliklari) o'zgaradi, sahifa kontenti yangi
      viewport balandligiga moslashadi. Bu pastdagi tugmalar
      klaviatura ostida qolib ketmasligini ta'minlaydi.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#080f1e" />
    <title>Zakovat</title>
    <!--
      Telegram WebApp rasmiy script: window.Telegram.WebApp obyektini
      yuklaydi. SHART — bu yo'q bo'lsa mini-app foydalanuvchi ID'sini
      ololmaydi va hamma "guest" sifatida kiradi.

      Avval @twa-dev/sdk npm package'i bu ishni qilardi, lekin u
      window.Telegram.WebApp'ni overwrite qilib auth'ni buzardi.
      Rasmiy script'ga o'tdik.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
