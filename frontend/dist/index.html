<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <!--
      interactive-widget=resizes-content: mobil klaviatura ochilganda
      viewport (vh/dvh birliklari) o'zgaradi, sahifa kontenti yangi
      viewport balandligiga moslashadi. Bu pastdagi tugmalar
      klaviatura ostida qolib ketmasligini ta'minlaydi.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#080f1e" />
    <title>Zakovat</title>
    <!--
      Svoyak ekranlari uchun premium shriftlar: Montserrat (sarlavhalar) +
      Inter (matn). Spec'da aniq nomlandilar. preconnect bilan tezroq yuklanadi.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <!--
      Telegram WebApp rasmiy script: window.Telegram.WebApp obyektini
      yuklaydi. SHART — bu yo'q bo'lsa mini-app foydalanuvchi ID'sini
      ololmaydi va hamma "guest" sifatida kiradi.

      Avval @twa-dev/sdk npm package'i bu ishni qilardi, lekin u
      window.Telegram.WebApp'ni overwrite qilib auth'ni buzardi.
      Rasmiy script'ga o'tdik.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" crossorigin src="/assets/index-C8A8QUlE.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-ajttisWs.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
